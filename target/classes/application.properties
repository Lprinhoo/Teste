# Configurações do Servidor
server.port=8080
server.address=0.0.0.0
server.servlet.context-path=/api

# Conexão com o PostgreSQL no PC do Banco (IP 10.0.7.50)
spring.datasource.url=jdbc:postgresql://10.0.7.50:5432/lev
spring.datasource.username=postgres
spring.datasource.password=level234

# Forçar a criação das tabelas
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Configurações extras para garantir a criação
spring.jpa.generate-ddl=true
spring.jpa.properties.hibernate.format_sql=true

# Permitir acesso via navegador (CORS)
spring.mvc.cors.allowed-origins=*
